<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koru Docs — docs.coru.dev</title>
<meta name="description" content="Documentation for Koru — the open-source autonomous refactor loop. Markdown-driven docs rendered in the browser.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round'><path d='M12 12a.75.75 0 0 1 .75.75A2.25 2.25 0 0 1 10.5 15 4 4 0 0 1 6.5 11 6 6 0 0 1 12.5 5 8 8 0 0 1 20.5 13 10 10 0 0 1 10.5 23'/></svg>">
<style>
:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --background: #0f172a;
    --surface: #1e293b;
    --surface-light: #334155;
    --text: #f1f5f9;
    --text-muted: #cbd5e1;
    --border: #475569;
    --success: #10b981;
    --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: clamp(15px, 0.42vw + 12.5px, 21px); scroll-behavior: smooth; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--background); color: var(--text); line-height: 1.65;
}
.svgi {
    width: 1.05em; height: 1.05em; display: inline-block; vertical-align: -0.16em;
    fill: none; stroke: currentColor; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
}
a { color: #a5b4fc; }
a:hover { color: #c7d2fe; }

.topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.7rem 1.2rem; background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
}
.topbar .brand { font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.45rem; }
.topbar .brand .svgi { color: var(--primary); width: 1.3em; height: 1.3em; }
.topbar .links { margin-left: auto; display: flex; gap: 1rem; font-size: 0.9rem; }

.layout { display: grid; grid-template-columns: 16rem minmax(0, 1fr); max-width: min(96rem, 96vw); margin: 0 auto; }
.sidebar {
    position: sticky; top: 3.2rem; align-self: start;
    max-height: calc(100vh - 3.2rem); overflow-y: auto;
    padding: 1.4rem 1rem 2rem 0.4rem; font-size: 0.9rem;
}
.sidebar h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 1.1rem 0 0.35rem; }
.sidebar a { display: block; padding: 0.22rem 0.6rem; color: var(--text-muted); text-decoration: none; border-left: 2px solid transparent; border-radius: 0 6px 6px 0; }
.sidebar a:hover { color: var(--text); background: var(--surface); }
.sidebar a.is-active { color: var(--text); border-left-color: var(--primary); background: var(--surface); }

main { padding: 1.6rem 0 5rem 2rem; min-width: 0; }
main section[id] { scroll-margin-top: 4.2rem; padding-top: 1.4rem; }
main h1 { font-size: 2rem; margin: 0.5em 0 0.5em; }
main h2 { font-size: 1.45rem; margin: 1.5em 0 0.5em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
main h3 { font-size: 1.1rem; margin: 1.2em 0 0.4em; }
main p, main li { color: var(--text-muted); }
main strong { color: var(--text); }
main ul, main ol { margin: 0.5em 0 0.9em 1.3em; }
main p { max-width: 62rem; margin: 0.4em 0 0.8em; }

main code {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.88em; background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 0.08em 0.4em; color: #c7d2fe;
}
main pre {
    background: #0b1120; border: 1px solid var(--border); border-radius: 10px;
    padding: 0.9rem 1.1rem; overflow-x: auto; margin: 0.7em 0 1.1em;
    max-width: 62rem;
}
main pre code { background: none; border: 0; padding: 0; color: var(--text-muted); font-size: 0.86rem; line-height: 1.65; }

main table { border-collapse: collapse; margin: 0.7em 0 1.1em; width: 100%; max-width: 62rem; font-size: 0.9rem; }
main th, main td { text-align: left; padding: 0.45em 0.8em; border: 1px solid var(--border); vertical-align: top; }
main th { background: var(--surface); color: var(--text); }
main td { color: var(--text-muted); }

main blockquote {
    display: flex; gap: 0.6rem; align-items: flex-start;
    background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 10px; padding: 0.8rem 1rem; margin: 0.8em 0 1.1em; max-width: 62rem;
}
main blockquote p { margin: 0; font-size: 0.92rem; }

.langbar { display: flex; gap: 6px; }
.langbar button {
    background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 7px; padding: 0.25rem 0.6rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: .04em;
}
.langbar button:hover { border-color: var(--primary); color: var(--text); }
.langbar button.is-active { background: var(--primary); border-color: var(--primary); color: #fff; }

.load-error { color: var(--warning); padding: 1rem; border: 1px solid var(--warning); border-radius: 10px; max-width: 62rem; }
.footer { margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem; }

@media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; display: flex; flex-wrap: wrap; gap: 0.1rem 0.5rem; padding: 0.8rem; }
    .sidebar h4 { width: 100%; margin: 0.5rem 0 0.1rem; }
    main { padding: 0.5rem 0.9rem 4rem; }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>
    <symbol id="i-spiral" viewBox="0 0 24 24"><path d="M12 12a.75.75 0 0 1 .75.75A2.25 2.25 0 0 1 10.5 15 4 4 0 0 1 6.5 11 6 6 0 0 1 12.5 5 8 8 0 0 1 20.5 13 10 10 0 0 1 10.5 23"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 11v5M12 7.5h.01"/></symbol>
  </defs>
</svg>

<div class="topbar">
    <a class="brand" href="#top"><svg class="svgi"><use href="#i-spiral"/></svg> Koru Docs</a>
    <div class="langbar" id="langbar" aria-label="Language">
        <button data-lang="en">EN</button>
        <button data-lang="pl">PL</button>
        <button data-lang="de">DE</button>
    </div>
    <div class="links">
        <a href="https://www.coru.dev">coru.dev</a>
        <a href="https://about.coru.dev">About</a>
        <a href="https://github.com/semcod/koru">GitHub</a>
        <a href="https://pypi.org/project/koru/">PyPI</a>
    </div>
</div>

<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main id="top">
    <h1 style="font-size:2.4rem"><svg class="svgi" style="color:var(--primary)"><use href="#i-spiral"/></svg> Koru documentation</h1>
    <p id="intro"></p>
    <div id="content"></div>
    <p class="footer">Apache-2.0 · <a href="https://github.com/semcod/koru">semcod/koru</a> · <a href="https://www.coru.dev">coru.dev</a> · <a href="https://about.coru.dev">about.coru.dev</a> · <a href="https://github.com/tom-sapletta-com/docs-coru-dev">edit these docs</a></p>
</main>
</div>

<script>
/* ---- Minimal Markdown renderer (headings, lists, tables, fences,
        blockquote callouts, inline code/bold/italic/links) ---- */
function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function inline(s) {
    // order matters: code spans first so their contents stay literal
    s = s.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[\s(])\*([^*\s][^*]*)\*(?=[\s).,;:!?]|$)/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) =>
        '<a href="' + u + '"' + (u.startsWith('http') ? ' target="_blank" rel="noopener"' : '') + '>' + t + '</a>');
    return s;
}

function renderMarkdown(md) {
    const lines = md.split(/\r?\n/);
    const out = [];
    let i = 0, list = null, para = [];

    const flushPara = () => {
        if (para.length) { out.push('<p>' + inline(para.join(' ')) + '</p>'); para = []; }
    };
    const flushList = () => {
        if (list) { out.push('</' + list + '>'); list = null; }
    };

    while (i < lines.length) {
        const line = lines[i];

        if (/^```/.test(line)) {                      // fenced code
            flushPara(); flushList();
            const buf = [];
            i += 1;
            while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i += 1; }
            i += 1;
            out.push('<pre><code>' + escapeHtml(buf.join('\n')) + '</code></pre>');
            continue;
        }
        if (/^\|/.test(line)) {                       // table
            flushPara(); flushList();
            const rows = [];
            while (i < lines.length && /^\|/.test(lines[i])) { rows.push(lines[i]); i += 1; }
            const cells = (r) => r.replace(/^\||\|$/g, '').split('|').map((c) => c.trim());
            let html = '<table>';
            rows.forEach((r, k) => {
                if (/^\|[\s:-]+\|/.test(r) && /-/.test(r)) return;   // separator row
                const tag = k === 0 ? 'th' : 'td';
                html += '<tr>' + cells(r).map((c) => '<' + tag + '>' + inline(escapeHtml(c)) + '</' + tag + '>').join('') + '</tr>';
            });
            out.push(html + '</table>');
            continue;
        }
        let m;
        if ((m = line.match(/^(#{1,3})\s+(.*)$/))) {  // headings
            flushPara(); flushList();
            const level = m[1].length;
            out.push('<h' + level + '>' + inline(escapeHtml(m[2])) + '</h' + level + '>');
        } else if ((m = line.match(/^>\s?(.*)$/))) {  // callout
            flushPara(); flushList();
            const buf = [m[1]];
            while (i + 1 < lines.length && /^>\s?/.test(lines[i + 1])) { i += 1; buf.push(lines[i].replace(/^>\s?/, '')); }
            out.push('<blockquote><svg class="svgi" style="color:var(--primary)"><use href="#i-info"/></svg><p>'
                     + inline(escapeHtml(buf.join(' '))) + '</p></blockquote>');
        } else if ((m = line.match(/^[-*]\s+(.*)$/))) {   // ul
            flushPara();
            if (list !== 'ul') { flushList(); out.push('<ul>'); list = 'ul'; }
            out.push('<li>' + inline(escapeHtml(m[1])) + '</li>');
        } else if ((m = line.match(/^\d+\.\s+(.*)$/))) {  // ol
            flushPara();
            if (list !== 'ol') { flushList(); out.push('<ol>'); list = 'ol'; }
            out.push('<li>' + inline(escapeHtml(m[1])) + '</li>');
        } else if (!line.trim()) {
            flushPara(); flushList();
        } else {
            flushList();
            para.push(escapeHtml(line.trim()));
        }
        i += 1;
    }
    flushPara(); flushList();
    return out.join('\n');
}

/* ---- Language-aware loader: content/<lang>/<file> with EN fallback ---- */
const LANG_KEY = 'coru-lang';
const INTRO = {
    en: '<strong>Koru</strong> is an open-source, fully autonomous refactor loop. These docs are plain Markdown files (<code>content/&lt;lang&gt;/*.md</code>) rendered in your browser.',
    pl: '<strong>Koru</strong> to otwartoźródłowa, w pełni autonomiczna pętla refaktoryzacji. Ta dokumentacja to zwykłe pliki Markdown (<code>content/&lt;lang&gt;/*.md</code>) renderowane w przeglądarce.',
    de: '<strong>Koru</strong> ist eine quelloffene, vollständig autonome Refactoring-Schleife. Diese Doku besteht aus Markdown-Dateien (<code>content/&lt;lang&gt;/*.md</code>), die im Browser gerendert werden.',
};

function detectLang(supported) {
    try {
        const saved = localStorage.getItem(LANG_KEY);
        if (supported.includes(saved)) return saved;
    } catch (e) {}
    const nav = (navigator.languages || [navigator.language || 'en']).map((l) => (l || '').slice(0, 2).toLowerCase());
    return nav.find((l) => supported.includes(l)) || 'en';
}

let manifest = null;

async function loadPage(lang, file) {
    for (const dir of [lang, 'en']) {
        try {
            const res = await fetch('content/' + dir + '/' + file);
            if (res.ok) return await res.text();
        } catch (e) {}
    }
    return null;
}

async function render(lang) {
    const contentEl = document.getElementById('content');
    const sidebar = document.getElementById('sidebar');
    const t = (obj) => (typeof obj === 'string' ? obj : (obj[lang] || obj.en));
    document.documentElement.lang = lang;
    document.getElementById('intro').innerHTML = INTRO[lang] || INTRO.en;
    document.querySelectorAll('#langbar button').forEach((b) => b.classList.toggle('is-active', b.dataset.lang === lang));
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}

    sidebar.replaceChildren();
    manifest.groups.forEach((group) => {
        const h = document.createElement('h4');
        h.textContent = t(group.title);
        sidebar.appendChild(h);
        group.pages.forEach((page) => {
            const a = document.createElement('a');
            a.href = '#' + page.id;
            a.textContent = t(page.title);
            a.dataset.page = page.id;
            sidebar.appendChild(a);
        });
    });

    const pages = manifest.groups.flatMap((g) => g.pages);
    const results = await Promise.all(pages.map(async (page) => ({
        page,
        md: (await loadPage(lang, page.file)) || ('# ' + t(page.title) + '\n\n> Failed to load `' + page.file + '`.'),
    })));
    contentEl.innerHTML = results.map(({ page, md }) =>
        '<section id="' + page.id + '">' + renderMarkdown(md) + '</section>').join('\n');

    const links = Array.from(sidebar.querySelectorAll('a[data-page]'));
    const byId = new Map(links.map((a) => [a.dataset.page, a]));
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
            if (e.isIntersecting) {
                links.forEach((a) => a.classList.remove('is-active'));
                const link = byId.get(e.target.id);
                if (link) link.classList.add('is-active');
            }
        });
    }, { rootMargin: '-15% 0px -75% 0px' });
    contentEl.querySelectorAll('section[id]').forEach((sec) => observer.observe(sec));
}

async function boot() {
    const contentEl = document.getElementById('content');
    try {
        manifest = await (await fetch('content/manifest.json')).json();
    } catch (e) {
        contentEl.innerHTML = '<div class="load-error">Could not load <code>content/manifest.json</code>. '
            + 'If you opened this file directly, serve it instead: <code>python3 -m http.server</code></div>';
        return;
    }
    const supported = manifest.languages || ['en'];
    document.querySelectorAll('#langbar button').forEach((b) =>
        b.addEventListener('click', () => render(b.dataset.lang)));
    await render(detectLang(supported));
    if (location.hash.length > 1) {
        const target = document.getElementById(location.hash.slice(1));
        if (target) target.scrollIntoView();
    }
}
boot();
</script>
</body>
</html>
